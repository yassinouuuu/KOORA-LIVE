<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأدمين - إدارة القنوات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Basic protection check before loading
        if (localStorage.getItem("adminAuth") !== "true") {
            window.location.href = "admin.html";
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-play-circle"></i>
                <span>لوحة<span>الأدمين</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="#" onclick="logout()" class="admin-link"><i class="fas fa-sign-out-alt"></i> خروج</a>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 50px;">
        <div class="hero">
            <h1>إدارة القنوات</h1>
            <p>أضف أو احذف قنوات البث المباشر بكل سهولة</p>
        </div>

        <div class="admin-card">
            <h2><i class="fas fa-plus-circle"></i> إضافة قناة جديدة</h2>
            <form id="addChannelForm" style="margin-top: 20px;">
                <div class="form-group">
                    <label>اسم القناة</label>
                    <input type="text" id="channelName" placeholder="مثال: beIN Sport 1" required>
                </div>
                <div class="form-group">
                    <label>كود IFRAME</label>
                    <textarea id="channelIframe" placeholder="ألصق كود الـ IFRAME هنا" required></textarea>
                </div>
                <button type="button" id="btnTest" class="btn-test"><i class="fas fa-vial"></i> تجربة القناة قبل الحفظ</button>
                <div id="previewBox" class="preview-box" style="display:none; margin-top: 20px;">
                    <div class="player-wrapper" id="previewWrapper"></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 20px;">حفظ القناة <i class="fas fa-save"></i></button>
            </form>
        </div>

        <div class="admin-card">
            <h2><i class="fas fa-list"></i> القنوات الحالية</h2>
            <div id="adminChannelsList" class="channels-manage-list">
                <!-- Channels will list here -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 جميع الحقوق محفوظة لـ لوحة التحكم</p>
        </div>
    </footer>

    <script src="dashboard.js"></script>
</body>
</html>
