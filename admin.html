<!-- admin.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الأدمين</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="admin-container">
        <div class="logo" style="justify-content: center; margin-bottom: 40px;">
            <i class="fas fa-user-shield"></i>
            <span>دخول<span>الأدمين</span></span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary">دخول <i class="fas fa-sign-in-alt"></i></button>
        </form>
        <p id="errorMsg" style="color: #ff4d4d; margin-top: 20px; text-align: center; display: none;"></p>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" style="color: var(--text-dim); text-decoration: none;"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
