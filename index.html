<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستريم لايف | الرئيسية</title>
    <meta name="description" content="أفضل موقع لمشاهدة بث القنوات المباشر ومتابعة جدول المباريات">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3f5efb;
            --secondary: #fc466b;
            --accent: #00ecbc;
            --bg: #0b091f;
            --card-bg: rgba(255,255,255,0.04);
            --text: #ffffff;
            --dim: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Background blobs */
        .blob {
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.1; z-index: -1;
            animation: blobFloat 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -200px; right: -200px; animation-delay: -5s; }
        @keyframes blobFloat { 0% { transform: translate(0,0); } 100% { transform: translate(80px,80px); } }

        /* Navbar */
        nav {
            padding: 15px 5%;
            background: rgba(15,12,41,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 999;
            backdrop-filter: blur(15px);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--secondary); }
        .nav-links a { color: #fff; text-decoration: none; margin-right: 20px; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--secondary); }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
        }
        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 30%, #aaa);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 1.3rem; color: var(--dim); margin-bottom: 40px; }
        .btn-hero {
            display: inline-block;
            padding: 16px 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 800; font-size: 1.3rem;
            text-decoration: none; border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(63,94,251,0.4);
        }
        .btn-hero:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(252,70,107,0.5); }

        /* Matches Container */
        .section-title {
            text-align: center;
            padding: 50px 20px 20px;
        }
        .section-title h2 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
        .section-title i { color: var(--secondary); margin-left:10px; }

        .matches-container {
            max-width: 900px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 20px 25px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .match-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--secondary);
            transform: translateX(-5px);
        }

        .match-teams { display: flex; align-items: center; gap: 15px; flex: 1; }
        .team { display: flex; align-items: center; font-weight: 700; font-size: 1.1rem; }
        .vs-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 800; font-size: 0.85rem;
            padding: 8px 14px; border-radius: 8px; text-align: center;
            min-width: 80px;
        }
        .match-channel {
            background: rgba(0,236,188,0.1);
            color: var(--accent);
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
        }

        .loading { text-align: center; padding: 40px; color: var(--dim); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--secondary); border-radius: 50%;
            display: inline-block; animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center; padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--dim); font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .hero h1 { font-size: 2.2rem; }
            .match-card { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
    <a href="index.html" class="logo">ستريم <span>لايف</span></a>
    <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="channels.html">القنوات</a>
        <a href="admin.html">الأدمين</a>
    </div>
</nav>

<div class="hero">
    <h1>عالم البث المباشر بين يديك</h1>
    <p>تابع أحدث المباريات وشاهد قنواتك المفضل بجودة عالية</p>
    <a href="channels.html" class="btn-hero"><i class="fas fa-play"></i> شاهد الآن</a>
</div>

<div class="section-title">
    <h2><i class="fas fa-futbol"></i> مباريات اليوم</h2>
    <button class="refresh-btn" onclick="loadMatches()" style="background:none; border:none; color:var(--dim); cursor:pointer; font-size:0.8rem; margin-top:5px;"><i class="fas fa-sync"></i> تحديث الجدول</button>
</div>

<div class="matches-container" id="matchesList"></div>

<footer>
    <p>© 2024 جميع الحقوق محفوظة لـ ستريم لايف</p>
</footer>

<script>
    function getTodayDate() {
        var d = new Date();
        var mm = String(d.getMonth() + 1).padStart(2, '0');
        var dd = String(d.getDate()).padStart(2, '0');
        return d.getFullYear() + '-' + mm + '-' + dd;
    }

    function formatTime(dateStr, timeStr) {
        if (!timeStr) return '';
        try {
            // API returns UTC time, convert to local
            var dt = new Date(dateStr + 'T' + timeStr + 'Z');
            return dt.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
        } catch(e) {
            return timeStr.slice(0, 5);
        }
    }

    function getStatusBadge(status) {
        if (!status) return '<div class="match-channel">مجدول</div>';
        var s = status.toLowerCase();
        if (s === 'match finished' || s === 'ft' || s.includes('finish')) {
            return '<div class="match-channel" style="background:rgba(255,80,80,0.15); color:#ff6060;">انتهت</div>';
        } else if (s.includes('progress') || s === 'live' || s === '1h' || s === '2h') {
            return '<div class="match-channel" style="background:rgba(0,236,100,0.15); color:#00ec70; animation: pulse 1.2s infinite;">🔴 مباشر</div>';
        }
        return '<div class="match-channel">مجدول</div>';
    }

    function loadMatches() {
        var container = document.getElementById('matchesList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري تحميل المباريات...</p></div>';

        var today = getTodayDate();
        var apiUrl = 'https://www.thesportsdb.com/api/v1/json/123/eventsday.php?d=' + today + '&s=Soccer';

        fetch(apiUrl)
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                renderMatches(data.events || []);
            })
            .catch(function(err) {
                console.error('Error fetching matches:', err);
                container.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle" style="font-size:2.5rem; color:var(--secondary); margin-bottom:15px; display:block;"></i><p>تعذر جلب المباريات</p><button onclick="loadMatches()" style="margin-top:15px; padding:10px 25px; background:var(--secondary); color:#fff; border:none; border-radius:25px; cursor:pointer; font-family:Cairo,sans-serif; font-size:1rem;">إعادة المحاولة</button></div>';
            });
    }

    function renderMatches(events) {
        var container = document.getElementById('matchesList');

        if (!events || events.length === 0) {
            container.innerHTML = '<div class="loading"><i class="fas fa-moon" style="font-size:3rem; color:#555; display:block; margin-bottom:15px;"></i><p>لا توجد مباريات كروية مجدولة اليوم</p></div>';
            return;
        }

        // Sort by time
        events.sort(function(a, b) {
            return (a.strTime || '').localeCompare(b.strTime || '');
        });

        var html = '';
        events.forEach(function(ev) {
            var home = ev.strHomeTeam || '';
            var away = ev.strAwayTeam || '';
            var league = ev.strLeague || '';
            var time = formatTime(ev.strDate || getTodayDate(), ev.strTime);
            var scoreHome = ev.intHomeScore;
            var scoreAway = ev.intAwayScore;
            var hasScore = (scoreHome !== null && scoreHome !== undefined && scoreHome !== '');
            var badge = getStatusBadge(ev.strStatus);
            var homeBadge = ev.strHomeTeamBadge ? '<img src="' + ev.strHomeTeamBadge + '/tiny" onerror="this.style.display=\'none\'" style="width:28px;height:28px;object-fit:contain;margin-left:8px;border-radius:4px;" loading="lazy">' : '';
            var awayBadge = ev.strAwayTeamBadge ? '<img src="' + ev.strAwayTeamBadge + '/tiny" onerror="this.style.display=\'none\'" style="width:28px;height:28px;object-fit:contain;margin-right:8px;border-radius:4px;" loading="lazy">' : '';

            var vsContent = hasScore
                ? '<div class="vs-badge">' + scoreHome + ' - ' + scoreAway + '<div style="font-size:0.6rem; opacity:0.8;">' + time + '</div></div>'
                : '<div class="vs-badge">VS<div style="font-size:0.6rem; opacity:0.8;">' + time + '</div></div>';

            html += '<div class="match-card">' +
                '<div style="width:100%;">' +
                    '<div style="font-size:0.75rem; color:var(--secondary); margin-bottom:8px; opacity:0.85;"><i class="fas fa-trophy" style="margin-left:5px;"></i>' + league + '</div>' +
                    '<div class="match-teams">' +
                        '<div class="team">' + homeBadge + '<span>' + home + '</span></div>' +
                        vsContent +
                        '<div class="team"><span>' + away + '</span>' + awayBadge + '</div>' +
                    '</div>' +
                '</div>' +
                badge +
            '</div>';
        });

        container.innerHTML = html;
    }

    loadMatches();
</script>

</body>
</html>
