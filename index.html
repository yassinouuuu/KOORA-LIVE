<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستريم لايف | الرئيسية</title>
    <meta name="description" content="أفضل موقع لمشاهدة بث القنوات المباشر ومتابعة جدول المباريات">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3f5efb;
            --secondary: #fc466b;
            --accent: #00ecbc;
            --bg: #0b091f;
            --card-bg: rgba(255,255,255,0.04);
            --text: #ffffff;
            --dim: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Background blobs */
        .blob {
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.1; z-index: -1;
            animation: blobFloat 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -200px; right: -200px; animation-delay: -5s; }
        @keyframes blobFloat { 0% { transform: translate(0,0); } 100% { transform: translate(80px,80px); } }

        /* Navbar */
        nav {
            padding: 15px 5%;
            background: rgba(15,12,41,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 999;
            backdrop-filter: blur(15px);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--secondary); }
        .nav-links a { color: #fff; text-decoration: none; margin-right: 20px; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--secondary); }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
        }
        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 30%, #aaa);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 1.3rem; color: var(--dim); margin-bottom: 40px; }
        .btn-hero {
            display: inline-block;
            padding: 16px 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 800; font-size: 1.3rem;
            text-decoration: none; border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(63,94,251,0.4);
        }
        .btn-hero:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(252,70,107,0.5); }

        /* Matches Container */
        .section-title {
            text-align: center;
            padding: 50px 20px 20px;
        }
        .section-title h2 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
        .section-title i { color: var(--secondary); margin-left:10px; }

        .matches-container {
            max-width: 900px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 20px 25px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .match-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--secondary);
            transform: translateX(-5px);
        }

        .match-teams { display: flex; align-items: center; gap: 15px; flex: 1; }
        .team { display: flex; align-items: center; font-weight: 700; font-size: 1.1rem; }
        .vs-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 800; font-size: 0.85rem;
            padding: 8px 14px; border-radius: 8px; text-align: center;
            min-width: 80px;
        }
        .match-channel {
            background: rgba(0,236,188,0.1);
            color: var(--accent);
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
        }

        .loading { text-align: center; padding: 40px; color: var(--dim); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--secondary); border-radius: 50%;
            display: inline-block; animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center; padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--dim); font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .hero h1 { font-size: 2.2rem; }
            .match-card { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
    <a href="index.html" class="logo">ستريم <span>لايف</span></a>
    <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="channels.html">القنوات</a>
        <a href="admin.html">الأدمين</a>
    </div>
</nav>

<div class="hero">
    <h1>عالم البث المباشر بين يديك</h1>
    <p>تابع أحدث المباريات وشاهد قنواتك المفضل بجودة عالية</p>
    <a href="channels.html" class="btn-hero"><i class="fas fa-play"></i> شاهد الآن</a>
</div>

<div class="section-title">
    <h2><i class="fas fa-futbol"></i> مباريات اليوم</h2>
    <button class="refresh-btn" onclick="loadMatches()" style="background:none; border:none; color:var(--dim); cursor:pointer; font-size:0.8rem; margin-top:5px;"><i class="fas fa-sync"></i> تحديث الجدول</button>
</div>

<div class="matches-container" id="matchesList"></div>

<footer>
    <p>© 2024 جميع الحقوق محفوظة لـ ستريم لايف</p>
</footer>

<script>
    var SOURCE_URL = 'https://livetv.aflam4you.net/index.php';

    function loadMatches() {
        var container = document.getElementById('matchesList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري تحميل المباريات...</p></div>';

        // Cleanest JSONP fetch approach
        var callbackName = 'sc_' + Math.floor(Math.random() * 1000000);
        window[callbackName] = function(data) {
            if (data && data.contents) parse(data.contents);
            delete window[callbackName];
            var s = document.getElementById('scr'); if(s) s.remove();
        };

        var script = document.createElement('script');
        script.id = 'scr';
        script.src = 'https://api.allorigins.win/get?url=' + encodeURIComponent(SOURCE_URL) + '&callback=' + callbackName;
        document.body.appendChild(script);

        setTimeout(function() {
            if (container.innerHTML.includes('spinner')) {
                container.innerHTML = '<div class="loading"><p>تعذر جلب البيانات تلقائياً</p><a href="' + SOURCE_URL + '" target="_blank" style="color:var(--secondary); text-decoration:none;">اضغط هنا لمشاهدة الجدول من المصدر الأصلي</a></div>';
            }
        }, 8000);
    }

    function parse(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var links = doc.querySelectorAll('a[href*="funding-tv"]');
        var container = document.getElementById('matchesList');
        var htmlStr = '';
        var seen = {};

        links.forEach(function(link) {
            var href = link.getAttribute('href');
            var text = link.innerText.replace(/\s+/g, ' ').trim();
            var timeMatch = text.match(/(\d{1,2}:\d{2})/);
            
            if (timeMatch && !seen[href]) {
                seen[href] = true;
                var clean = text.replace(timeMatch[0], '').replace('بتوقيت غرينتش', '').trim();
                var teams = clean.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length > 1;});
                
                if (teams.length >= 2) {
                    htmlStr += '<a class="match-card" href="' + SOURCE_URL + '" target="_blank">' +
                        '<div class="match-teams">' +
                            '<div class="team"><span>' + teams[0] + '</span></div>' +
                            '<div class="vs-badge">VS<div style="font-size:0.6rem; opacity:0.8;">' + timeMatch[0] + ' GMT</div></div>' +
                            '<div class="team"><span>' + teams[teams.length-1] + '</span></div>' +
                        '</div>' +
                        '<div class="match-channel">مباشر</div>' +
                    '</a>';
                }
            }
        });

        container.innerHTML = htmlStr || '<div class="loading">لا توجد مباريات معروضة حالياً</div>';
    }

    loadMatches();
</script>

</body>
</html>
